apiVersion: v1
kind: Namespace
metadata:
  name: flink-stage
  labels:
    app.kubernetes.io/part-of: flink-platform
    environment: stage
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-runner
  namespace: flink-stage
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-deployer
  namespace: flink-stage
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-sql-submitter
  namespace: flink-stage
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-observer
  namespace: flink-stage
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-runner
  namespace: flink-stage
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-runner
  namespace: flink-stage
subjects:
  - kind: ServiceAccount
    name: flink-runner
    namespace: flink-stage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-deployer
  namespace: flink-stage
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "serviceaccounts", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-deployer
  namespace: flink-stage
subjects:
  - kind: ServiceAccount
    name: flink-deployer
    namespace: flink-stage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-deployer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-sql-submitter
  namespace: flink-stage
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-sql-submitter
  namespace: flink-stage
subjects:
  - kind: ServiceAccount
    name: flink-sql-submitter
    namespace: flink-stage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-sql-submitter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-observer
  namespace: flink-stage
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "events", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-observer
  namespace: flink-stage
subjects:
  - kind: ServiceAccount
    name: flink-observer
    namespace: flink-stage
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-observer
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: flink-stage-quota
  namespace: flink-stage
spec:
  hard:
    requests.cpu: "10"
    requests.memory: 40Gi
    limits.cpu: "20"
    limits.memory: 80Gi
    requests.storage: 600Gi
    persistentvolumeclaims: "12"
    pods: "80"
    services: "30"
    secrets: "90"
    configmaps: "90"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: flink-stage-defaults
  namespace: flink-stage
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 150m
        memory: 384Mi
      default:
        cpu: "1500m"
        memory: 3Gi
      max:
        cpu: "6"
        memory: 12Gi
      min:
        cpu: 50m
        memory: 128Mi
    - type: PersistentVolumeClaim
      max:
        storage: 120Gi
      min:
        storage: 1Gi
