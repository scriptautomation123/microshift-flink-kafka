apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: flink-taskmanager
spec:
  serviceName: flink-taskmanager
  replicas: 3
  podManagementPolicy: Parallel
  selector:
    matchLabels:
      app.kubernetes.io/name: flink
      app.kubernetes.io/component: taskmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flink
        app.kubernetes.io/component: taskmanager
    spec:
      serviceAccountName: flink-runner
      terminationGracePeriodSeconds: 60
      containers:
        - name: taskmanager
          image: {{SQL_RUNTIME_IMAGE_REF}}
          imagePullPolicy: IfNotPresent
          env:
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
          envFrom:
            - secretRef:
                name: flink-objectstore
          command:
            - /bin/bash
            - -lc
            - >-
              exec /opt/flink/bin/taskmanager.sh start-foreground
              -Dtaskmanager.host=${POD_IP}
              -Dtaskmanager.resource-id=${POD_NAME}
          resources:
            requests:
              cpu: "2"
              memory: 12Gi
            limits:
              cpu: "4"
              memory: 12Gi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: flink-config
              mountPath: /opt/flink/conf/config.yaml
              subPath: config.yaml
            - name: kafka-files
              mountPath: /opt/flink/secrets/kafka
              readOnly: true
            - name: taskmanager-data
              mountPath: /var/lib/flink
      volumes:
        - name: flink-config
          configMap:
            name: flink-config
        - name: kafka-files
          secret:
            secretName: flink-kafka-files
  volumeClaimTemplates:
    - metadata:
        name: taskmanager-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 100Gi