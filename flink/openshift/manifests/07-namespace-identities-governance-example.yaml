apiVersion: v1
kind: Namespace
metadata:
  name: flink-prod
  labels:
    app.kubernetes.io/part-of: flink-platform
    environment: prod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-runner
  namespace: flink-prod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-deployer
  namespace: flink-prod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-sql-submitter
  namespace: flink-prod
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-observer
  namespace: flink-prod
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-runner
  namespace: flink-prod
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-runner
  namespace: flink-prod
subjects:
  - kind: ServiceAccount
    name: flink-runner
    namespace: flink-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-deployer
  namespace: flink-prod
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "serviceaccounts", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-deployer
  namespace: flink-prod
subjects:
  - kind: ServiceAccount
    name: flink-deployer
    namespace: flink-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-deployer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-sql-submitter
  namespace: flink-prod
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-sql-submitter
  namespace: flink-prod
subjects:
  - kind: ServiceAccount
    name: flink-sql-submitter
    namespace: flink-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-sql-submitter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-observer
  namespace: flink-prod
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "events", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-observer
  namespace: flink-prod
subjects:
  - kind: ServiceAccount
    name: flink-observer
    namespace: flink-prod
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-observer
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: flink-prod-quota
  namespace: flink-prod
spec:
  hard:
    requests.cpu: "16"
    requests.memory: 64Gi
    limits.cpu: "32"
    limits.memory: 128Gi
    requests.storage: 1000Gi
    persistentvolumeclaims: "20"
    pods: "120"
    services: "40"
    secrets: "120"
    configmaps: "120"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: flink-prod-defaults
  namespace: flink-prod
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 250m
        memory: 512Mi
      default:
        cpu: "2"
        memory: 4Gi
      max:
        cpu: "8"
        memory: 16Gi
      min:
        cpu: 50m
        memory: 128Mi
    - type: PersistentVolumeClaim
      max:
        storage: 200Gi
      min:
        storage: 1Gi