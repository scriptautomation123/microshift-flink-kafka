apiVersion: v1
kind: Service
metadata:
  name: flink-sql-gateway
spec:
  selector:
    app.kubernetes.io/name: flink
    app.kubernetes.io/component: sql-gateway
  ports:
    - name: rest
      port: 8083
      targetPort: 8083
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: flink-sql-gateway
spec:
  replicas: 2
  selector:
    matchLabels:
      app.kubernetes.io/name: flink
      app.kubernetes.io/component: sql-gateway
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flink
        app.kubernetes.io/component: sql-gateway
    spec:
      serviceAccountName: flink-runner
      terminationGracePeriodSeconds: 30
      containers:
        - name: sql-gateway
          image: {{SQL_RUNTIME_IMAGE_REF}}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
            - >-
              exec /opt/flink/bin/sql-gateway.sh start-foreground
              -Dsql-gateway.endpoint.type=rest
              -Dsql-gateway.endpoint.rest.address=0.0.0.0
              -Dsql-gateway.endpoint.rest.bind-address=0.0.0.0
              -Dsql-gateway.endpoint.rest.bind-port=8083
              -Dsql-gateway.endpoint.rest.port=8083
              -Drest.address=flink-jobmanager
              -Drest.port=8081
          ports:
            - containerPort: 8083
              name: rest
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "1"
              memory: 2Gi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: flink-config
              mountPath: /opt/flink/conf/config.yaml
              subPath: config.yaml
      volumes:
        - name: flink-config
          configMap:
            name: flink-config