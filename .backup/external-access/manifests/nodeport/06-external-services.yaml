apiVersion: v1
kind: Service
metadata:
  name: kafka-external-0
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/component: external-access
spec:
  type: NodePort
  selector:
    statefulset.kubernetes.io/pod-name: kafka-0
  ports:
    - name: broker
      port: 9092
      targetPort: 19092
      nodePort: 31092
