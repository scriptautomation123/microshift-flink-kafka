apiVersion: v1
kind: ConfigMap
metadata:
  name: kafka-envoy-bootstrap
data:
  envoy.yaml: |
    static_resources:
      listeners:
      - name: broker_egress_listener
        address:
          socket_address:
            address: 0.0.0.0
            port_value: 19092
        filter_chains:
        - filters:
          - name: envoy.filters.network.tcp_proxy
            typed_config:
              '@type': type.googleapis.com/envoy.extensions.filters.network.tcp_proxy.v3.TcpProxy
              stat_prefix: kafka_tcp
              cluster: kafka_broker_local
      clusters:
      - name: kafka_broker_local
        connect_timeout: 1s
        type: STATIC
        lb_policy: ROUND_ROBIN
        load_assignment:
          cluster_name: kafka_broker_local
          endpoints:
          - lb_endpoints:
            - endpoint:
                address:
                  socket_address:
                    address: 127.0.0.1
                    port_value: 19093
