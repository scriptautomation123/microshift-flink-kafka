apiVersion: v1
kind: Service
metadata:
  name: flink-jobmanager
spec:
  clusterIP: None
  publishNotReadyAddresses: true
  selector:
    app.kubernetes.io/name: flink
    app.kubernetes.io/component: jobmanager
  ports:
    - name: rpc
      port: 6123
      targetPort: 6123
    - name: blob
      port: 6124
      targetPort: 6124
    - name: rest
      port: 8081
      targetPort: 8081
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: flink-jobmanager
spec:
  serviceName: flink-jobmanager
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: flink
      app.kubernetes.io/component: jobmanager
  template:
    metadata:
      labels:
        app.kubernetes.io/name: flink
        app.kubernetes.io/component: jobmanager
    spec:
      serviceAccountName: flink-runner
      terminationGracePeriodSeconds: 30
      containers:
        - name: jobmanager
          image: {{SQL_RUNTIME_IMAGE_REF}}
          imagePullPolicy: IfNotPresent
          command:
            - /bin/bash
            - -lc
            - exec /opt/flink/bin/jobmanager.sh start-foreground
          ports:
            - containerPort: 6123
              name: rpc
            - containerPort: 6124
              name: blob
            - containerPort: 8081
              name: rest
          envFrom:
            - secretRef:
                name: flink-objectstore
          resources:
            requests:
              cpu: "1"
              memory: 3Gi
            limits:
              cpu: "2"
              memory: 3Gi
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: flink-config
              mountPath: /opt/flink/conf/config.yaml
              subPath: config.yaml
            - name: kafka-files
              mountPath: /opt/flink/secrets/kafka
              readOnly: true
            - name: jobmanager-data
              mountPath: /var/lib/flink
      volumes:
        - name: flink-config
          configMap:
            name: flink-config
        - name: kafka-files
          secret:
            secretName: flink-kafka-files
  volumeClaimTemplates:
    - metadata:
        name: jobmanager-data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 20Gi