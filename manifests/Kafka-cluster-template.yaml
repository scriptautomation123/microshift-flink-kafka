apiVersion: template.openshift.io/v1
kind: Template
metadata:
  name: kafka-cluster
  description: "Apache Kafka KRaft cluster with 3 replicas on OpenShift"
  labels:
    app.kubernetes.io/name: kafka
    app.kubernetes.io/part-of: kafka-platform
parameters:
  - name: OPENSHIFT_NAMESPACE
    description: "OpenShift namespace for Kafka deployment"
    required: true
  - name: KAFKA_CLUSTER_ID
    description: "Unique Kafka cluster identifier for KRaft"
    required: true
    value: "MkVmNDMyMDEyZTkyYjljOGQ="
  - name: KAFKA_IMAGE_REF
    description: "Container image reference for Kafka KRaft"
    required: true
    value: "image-registry.openshift-image-registry.svc:5000/kafka-dev/kafka-kraft:3.7.1"
  - name: KAFKA_REPLICAS
    description: "Number of Kafka broker replicas"
    required: true
    value: "3"
  - name: KAFKA_STORAGE
    description: "Storage size per broker (Gi)"
    required: true
    value: "50"
  - name: KAFKA_CPU_REQUEST
    description: "CPU request per broker"
    required: true
    value: "1"
  - name: KAFKA_CPU_LIMIT
    description: "CPU limit per broker"
    required: true
    value: "2"
  - name: KAFKA_MEMORY_REQUEST
    description: "Memory request per broker (Gi)"
    required: true
    value: "2"
  - name: KAFKA_MEMORY_LIMIT
    description: "Memory limit per broker (Gi)"
    required: true
    value: "4"
  - name: KAFKA_DEFAULT_REPLICATION_FACTOR
    description: "Default replication factor for topics"
    required: true
    value: "3"
  - name: KAFKA_MIN_INSYNC_REPLICAS
    description: "Minimum in-sync replicas for topics"
    required: true
    value: "2"
  - name: KAFKA_NUM_PARTITIONS
    description: "Default number of partitions for topics"
    required: true
    value: "6"
  - name: KAFKA_PDB_MIN_AVAILABLE
    description: "PodDisruptionBudget minimum available replicas"
    required: true
    value: "2"
objects:
  # ============================================================================
  # ServiceAccount
  # ============================================================================
  - apiVersion: v1
    kind: ServiceAccount
    metadata:
      name: kafka-runner
      namespace: ${OPENSHIFT_NAMESPACE}
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/component: runner

  # ============================================================================
  # Headless Service (inter-pod communication)
  # ============================================================================
  - apiVersion: v1
    kind: Service
    metadata:
      name: kafka-headless
      namespace: ${OPENSHIFT_NAMESPACE}
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/component: headless-service
    spec:
      clusterIP: None
      publishNotReadyAddresses: true
      selector:
        app.kubernetes.io/name: kafka
      ports:
        - name: broker
          port: 9092
          targetPort: 9092
        - name: controller
          port: 9093
          targetPort: 9093

  # ============================================================================
  # Client Service (external access)
  # ============================================================================
  - apiVersion: v1
    kind: Service
    metadata:
      name: kafka
      namespace: ${OPENSHIFT_NAMESPACE}
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/component: client-service
    spec:
      selector:
        app.kubernetes.io/name: kafka
      ports:
        - name: broker
          port: 9092
          targetPort: 9092

  # ============================================================================
  # StatefulSet: Kafka Brokers (KRaft mode)
  # ============================================================================
  - apiVersion: apps/v1
    kind: StatefulSet
    metadata:
      name: kafka
      namespace: ${OPENSHIFT_NAMESPACE}
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/component: broker
    spec:
      serviceName: kafka-headless
      replicas: ${{KAFKA_REPLICAS}}
      podManagementPolicy: Parallel
      selector:
        matchLabels:
          app.kubernetes.io/name: kafka
      template:
        metadata:
          labels:
            app.kubernetes.io/name: kafka
        spec:
          serviceAccountName: kafka-runner
          terminationGracePeriodSeconds: 30
          topologySpreadConstraints:
            - maxSkew: 1
              topologyKey: kubernetes.io/hostname
              whenUnsatisfiable: ScheduleAnyway
              labelSelector:
                matchLabels:
                  app.kubernetes.io/name: kafka
          affinity:
            podAntiAffinity:
              preferredDuringSchedulingIgnoredDuringExecution:
                - weight: 100
                  podAffinityTerm:
                    labelSelector:
                      matchLabels:
                        app.kubernetes.io/name: kafka
                    topologyKey: kubernetes.io/hostname
          containers:
            - name: kafka
              image: ${KAFKA_IMAGE_REF}
              imagePullPolicy: IfNotPresent
              ports:
                - name: broker
                  containerPort: 9092
                - name: controller
                  containerPort: 9093
              env:
                - name: KAFKA_NAMESPACE
                  valueFrom:
                    fieldRef:
                      fieldPath: metadata.namespace
                - name: KAFKA_CLUSTER_ID
                  value: "${KAFKA_CLUSTER_ID}"
                - name: KAFKA_REPLICAS
                  value: "${KAFKA_REPLICAS}"
                - name: KAFKA_HEADLESS_SERVICE
                  value: kafka-headless
                - name: KAFKA_DEFAULT_REPLICATION_FACTOR
                  value: "${KAFKA_DEFAULT_REPLICATION_FACTOR}"
                - name: KAFKA_MIN_INSYNC_REPLICAS
                  value: "${KAFKA_MIN_INSYNC_REPLICAS}"
                - name: KAFKA_NUM_PARTITIONS
                  value: "${KAFKA_NUM_PARTITIONS}"
                - name: KAFKA_DATA_DIR
                  value: /var/lib/kafka/data
              resources:
                requests:
                  cpu: "${KAFKA_CPU_REQUEST}"
                  memory: ${KAFKA_MEMORY_REQUEST}Gi
                limits:
                  cpu: "${KAFKA_CPU_LIMIT}"
                  memory: ${KAFKA_MEMORY_LIMIT}Gi
              securityContext:
                runAsNonRoot: true
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                seccompProfile:
                  type: RuntimeDefault
              volumeMounts:
                - name: data
                  mountPath: /var/lib/kafka/data
      volumeClaimTemplates:
        - metadata:
            name: data
          spec:
            accessModes: ["ReadWriteOnce"]
            resources:
              requests:
                storage: ${KAFKA_STORAGE}Gi

  # ============================================================================
  # PodDisruptionBudget
  # ============================================================================
  - apiVersion: policy/v1
    kind: PodDisruptionBudget
    metadata:
      name: kafka
      namespace: ${OPENSHIFT_NAMESPACE}
      labels:
        app.kubernetes.io/name: kafka
        app.kubernetes.io/component: pdb
    spec:
      minAvailable: ${{KAFKA_PDB_MIN_AVAILABLE}}
      selector:
        matchLabels:
          app.kubernetes.io/name: kafka
