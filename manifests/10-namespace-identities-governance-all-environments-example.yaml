apiVersion: v1
kind: Namespace
metadata:
  name: flink-dev
  labels:
    app.kubernetes.io/part-of: flink-platform
    environment: dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-runner
  namespace: flink-dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-deployer
  namespace: flink-dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-sql-submitter
  namespace: flink-dev
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: flink-observer
  namespace: flink-dev
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-runner
  namespace: flink-dev
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-runner
  namespace: flink-dev
subjects:
  - kind: ServiceAccount
    name: flink-runner
    namespace: flink-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-runner
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-deployer
  namespace: flink-dev
rules:
  - apiGroups: [""]
    resources: ["configmaps", "secrets", "services", "serviceaccounts", "persistentvolumeclaims"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["route.openshift.io"]
    resources: ["routes"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-deployer
  namespace: flink-dev
subjects:
  - kind: ServiceAccount
    name: flink-deployer
    namespace: flink-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-deployer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-sql-submitter
  namespace: flink-dev
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "events"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-sql-submitter
  namespace: flink-dev
subjects:
  - kind: ServiceAccount
    name: flink-sql-submitter
    namespace: flink-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-sql-submitter
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: flink-observer
  namespace: flink-dev
rules:
  - apiGroups: [""]
    resources: ["pods", "services", "endpoints", "events", "configmaps"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources: ["deployments", "statefulsets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: flink-observer
  namespace: flink-dev
subjects:
  - kind: ServiceAccount
    name: flink-observer
    namespace: flink-dev
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: flink-observer
---
apiVersion: v1
kind: ResourceQuota
metadata:
  name: flink-dev-quota
  namespace: flink-dev
spec:
  hard:
    requests.cpu: "6"
    requests.memory: 24Gi
    limits.cpu: "12"
    limits.memory: 48Gi
    requests.storage: 300Gi
    persistentvolumeclaims: "8"
    pods: "50"
    services: "20"
    secrets: "60"
    configmaps: "60"
---
apiVersion: v1
kind: LimitRange
metadata:
  name: flink-dev-defaults
  namespace: flink-dev
spec:
  limits:
    - type: Container
      defaultRequest:
        cpu: 100m
        memory: 256Mi
      default:
        cpu: "1"
        memory: 2Gi
      max:
        cpu: "4"
        memory: 8Gi
      min:
        cpu: 50m
        memory: 128Mi
    - type: PersistentVolumeClaim
      max:
        storage: 80Gi
      min:
        storage: 1Gi

